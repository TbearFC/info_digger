<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>info_digger — AI Intelligence Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --github: #3b82f6;
      --arxiv: #f97316;
      --huggingface: #22c55e;
      --twitter: #a855f7;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .controls label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .source-filters { display: flex; gap: 8px; flex-wrap: wrap; }

    .source-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .source-btn.active-github     { border-color: var(--github);     color: var(--github);     background: rgba(59,130,246,.1); }
    .source-btn.active-arxiv      { border-color: var(--arxiv);      color: var(--arxiv);      background: rgba(249,115,22,.1); }
    .source-btn.active-huggingface{ border-color: var(--huggingface);color: var(--huggingface);background: rgba(34,197,94,.1); }
    .source-btn.active-twitter    { border-color: var(--twitter);    color: var(--twitter);    background: rgba(168,85,247,.1); }
    .source-btn.active-all        { border-color: var(--accent);     color: var(--accent);     background: rgba(99,102,241,.1); }

    /* Research assistant panel */
    .ask-panel {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 24px 0;
    }

    .ask-row {
      display: flex;
      gap: 8px;
    }

    .ask-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    .ask-input:focus { border-color: var(--accent); }
    .ask-input::placeholder { color: var(--muted); }

    .ask-btn {
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }

    .ask-btn:hover { opacity: .85; }
    .ask-btn:disabled { opacity: .4; cursor: default; }

    .ask-answer {
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      display: none;
    }

    .ask-answer.visible { display: block; }

    .ask-answer-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .ask-sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .ask-sources a {
      color: var(--muted);
      text-decoration: none;
    }

    .ask-sources a:hover { color: var(--accent); }

    /* Activity chart */
    .chart-wrap {
      max-width: 800px;
      margin: 16px auto 0;
      padding: 0 24px;
    }

    .chart-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .chart-empty {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 16px 0;
    }

    svg.chart { width: 100%; height: 120px; display: block; }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    .month-group { margin-bottom: 32px; }

    .month-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .entry {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .entry:last-child { border-bottom: none; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .dot-github      { background: var(--github); }
    .dot-arxiv       { background: var(--arxiv); }
    .dot-huggingface { background: var(--huggingface); }
    .dot-twitter     { background: var(--twitter); }

    .entry-body { flex: 1; min-width: 0; }

    .entry-title {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .entry-title a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      word-break: break-word;
    }

    .entry-title a:hover { color: var(--accent); }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-github      { background: rgba(59,130,246,.15);  color: var(--github); }
    .badge-arxiv       { background: rgba(249,115,22,.15);  color: var(--arxiv); }
    .badge-huggingface { background: rgba(34,197,94,.15);   color: var(--huggingface); }
    .badge-twitter     { background: rgba(168,85,247,.15);  color: var(--twitter); }

    .entry-summary {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(99,102,241,.1);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,.2);
    }

    .load-more-wrap { text-align: center; margin-top: 32px; }

    .load-more {
      padding: 10px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: border-color .15s;
    }

    .load-more:hover { border-color: var(--accent); color: var(--accent); }
    .load-more:disabled { opacity: .4; cursor: default; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 15px;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>

<header>
  <div class="logo">info_digger <span>/ AI timeline</span></div>
</header>

<div class="controls">
  <div style="display:flex;align-items:center;gap:8px">
    <label>Topic</label>
    <select id="topic-select">
      <option value="">All topics</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <label>Source</label>
    <div class="source-filters">
      <button class="source-btn active-all" data-source="" id="btn-all">All</button>
      <button class="source-btn" data-source="github" id="btn-github">GitHub</button>
      <button class="source-btn" data-source="arxiv" id="btn-arxiv">arXiv</button>
      <button class="source-btn" data-source="huggingface" id="btn-huggingface">HuggingFace</button>
      <button class="source-btn" data-source="twitter" id="btn-twitter">Twitter</button>
    </div>
  </div>
</div>

<!-- Research assistant -->
<div class="ask-panel">
  <div class="ask-row">
    <input
      type="text"
      class="ask-input"
      id="ask-input"
      placeholder="Ask anything: e.g. What happened with RAG this month?"
    >
    <button class="ask-btn" id="ask-btn">Ask</button>
  </div>
  <div class="ask-answer" id="ask-answer">
    <div class="ask-answer-label">Answer</div>
    <div id="ask-answer-text"></div>
    <div class="ask-sources" id="ask-sources"></div>
  </div>
</div>

<!-- Activity chart -->
<div class="chart-wrap">
  <div class="chart-label">Topic activity over time</div>
  <div id="chart-container"><div class="chart-empty">Loading chart...</div></div>
</div>

<main id="main">
  <div class="loading">Loading timeline...</div>
</main>

<script>
  const API = '';
  let currentTopic = '';
  let currentSource = '';
  let offset = 0;
  let loading = false;
  const LIMIT = 50;

  const SOURCE_COLORS = {
    github: '#3b82f6',
    arxiv: '#f97316',
    huggingface: '#22c55e',
    twitter: '#a855f7',
  };

  // Source filter buttons
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.source-btn').forEach(b => { b.className = 'source-btn'; });
      const src = btn.dataset.source;
      btn.className = src ? `source-btn active-${src}` : 'source-btn active-all';
      currentSource = src;
      reset();
    });
  });

  document.getElementById('topic-select').addEventListener('change', function() {
    currentTopic = this.value;
    reset();
  });

  function reset() {
    offset = 0;
    document.getElementById('main').innerHTML = '<div class="loading">Loading...</div>';
    loadEntries(true);
    loadChart();
  }

  // ── Load topics ──────────────────────────────────────────────────────────
  async function loadTopics() {
    try {
      const res = await fetch(API + '/api/topics');
      const topics = await res.json();
      const sel = document.getElementById('topic-select');
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.error('Failed to load topics', e);
    }
  }

  // ── Activity chart ───────────────────────────────────────────────────────
  async function loadChart() {
    const container = document.getElementById('chart-container');
    try {
      const params = new URLSearchParams();
      if (currentTopic) params.set('topic', currentTopic);
      const res = await fetch(API + '/api/stats?' + params);
      const data = await res.json();

      if (data.length < 2) {
        container.innerHTML = '<div class="chart-empty">Not enough data for a chart yet.</div>';
        return;
      }

      container.innerHTML = renderChart(data);
    } catch (e) {
      container.innerHTML = '';
    }
  }

  function renderChart(data) {
    const W = 800, H = 120, PAD = { top: 10, right: 10, bottom: 24, left: 36 };
    const innerW = W - PAD.left - PAD.right;
    const innerH = H - PAD.top - PAD.bottom;

    // Detect which sources have data
    const activeSources = Object.keys(SOURCE_COLORS).filter(src =>
      data.some(d => d[src] > 0)
    );
    if (activeSources.length === 0) {
      return '<div class="chart-empty">Not enough data for a chart yet.</div>';
    }

    const months = data.map(d => d.month);
    const maxVal = Math.max(1, ...data.flatMap(d => activeSources.map(s => d[s] || 0)));

    const xScale = i => PAD.left + (months.length > 1 ? (i / (months.length - 1)) * innerW : innerW / 2);
    const yScale = v => PAD.top + innerH - (v / maxVal) * innerH;

    // Y-axis ticks: 0, mid, max (deduplicated)
    const rawTicks = [0, Math.round(maxVal / 2), maxVal];
    const ticks = [...new Set(rawTicks)];

    let gridlines = '', ylabels = '';
    ticks.forEach(tick => {
      const y = yScale(tick);
      gridlines += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#2a2d3e" stroke-width="1" stroke-dasharray="3,3"/>`;
      ylabels += `<text x="${PAD.left - 4}" y="${y + 3}" fill="#64748b" font-size="9" text-anchor="end">${tick}</text>`;
    });

    let paths = '';
    activeSources.forEach(src => {
      const points = data.map((d, i) => `${xScale(i)},${yScale(d[src] || 0)}`).join(' ');
      paths += `<polyline points="${points}" fill="none" stroke="${SOURCE_COLORS[src]}" stroke-width="1.5" opacity="0.85">`;
      // Hover tooltips on each data point
      data.forEach((d, i) => {
        if (d[src]) {
          paths += `<circle cx="${xScale(i)}" cy="${yScale(d[src])}" r="3" fill="${SOURCE_COLORS[src]}"><title>${d.month} · ${src}: ${d[src]}</title></circle>`;
        }
      });
      paths += `</polyline>`;
    });

    // X-axis labels (show every Nth month to avoid overlap)
    const step = Math.max(1, Math.floor(months.length / 6));
    let xlabels = '';
    months.forEach((m, i) => {
      if (i % step === 0 || i === months.length - 1) {
        xlabels += `<text x="${xScale(i)}" y="${H - 4}" fill="#64748b" font-size="9" text-anchor="middle">${m}</text>`;
      }
    });

    return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${gridlines}${ylabels}${paths}${xlabels}</svg>`;
  }

  // ── Research assistant ───────────────────────────────────────────────────
  const askInput = document.getElementById('ask-input');
  const askBtn = document.getElementById('ask-btn');
  const askAnswer = document.getElementById('ask-answer');
  const askAnswerText = document.getElementById('ask-answer-text');
  const askSources = document.getElementById('ask-sources');

  async function doAsk() {
    const question = askInput.value.trim();
    if (!question) return;

    askBtn.disabled = true;
    askBtn.textContent = '...';
    askAnswer.classList.remove('visible');

    try {
      const res = await fetch(API + '/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, topic: currentTopic || null }),
      });
      const data = await res.json();

      if (!res.ok) {
        askAnswerText.textContent = data.detail?.message || 'Error: service unavailable';
        askSources.innerHTML = '';
      } else {
        askAnswerText.textContent = data.answer;
        if (data.sources && data.sources.length) {
          const top5 = data.sources.slice(0, 5);
          askSources.innerHTML = 'Sources: ' + top5.map(s =>
            `<a href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(s.title)}</a>`
          ).join(' · ');
        } else {
          askSources.innerHTML = '';
        }
      }
      askAnswer.classList.add('visible');
    } catch (e) {
      askAnswerText.textContent = 'Failed to reach server.';
      askAnswer.classList.add('visible');
    } finally {
      askBtn.disabled = false;
      askBtn.textContent = 'Ask';
    }
  }

  askBtn.addEventListener('click', doAsk);
  askInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAsk(); });

  // ── Timeline ─────────────────────────────────────────────────────────────
  function monthKey(iso) { return iso ? iso.slice(0, 7) : 'unknown'; }

  function monthLabel(key) {
    if (key === 'unknown') return 'Unknown';
    const [y, m] = key.split('-');
    return new Date(+y, +m - 1).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
  }

  function sourceBadgeLabel(source) {
    const labels = { github: 'GitHub', arxiv: 'arXiv', huggingface: 'HuggingFace', twitter: 'Twitter' };
    return labels[source] || source;
  }

  function renderEntries(entries, append) {
    const main = document.getElementById('main');

    if (!append) {
      main.innerHTML = '';
      if (entries.length === 0) {
        main.innerHTML = '<div class="empty">No entries found. The crawler may still be running — check back in a few minutes.</div>';
        return;
      }
    }

    const oldBtn = document.getElementById('load-more-btn');
    if (oldBtn) oldBtn.parentElement.remove();

    const groups = {};
    entries.forEach(e => {
      const k = monthKey(e.published_at);
      if (!groups[k]) groups[k] = [];
      groups[k].push(e);
    });

    Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0])).forEach(([key, items]) => {
      let group = document.querySelector(`[data-month="${key}"]`);
      if (!group) {
        group = document.createElement('div');
        group.className = 'month-group';
        group.dataset.month = key;
        group.innerHTML = `<div class="month-label">${monthLabel(key)}</div>`;
        main.appendChild(group);
      }

      items.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        const tagsHtml = (entry.topic_tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
        div.innerHTML = `
          <div class="dot dot-${entry.source}"></div>
          <div class="entry-body">
            <div class="entry-title">
              <a href="${escHtml(entry.url)}" target="_blank" rel="noopener">${escHtml(entry.title)}</a>
              <span class="badge badge-${entry.source}">${sourceBadgeLabel(entry.source)}</span>
            </div>
            ${entry.summary ? `<div class="entry-summary">${escHtml(entry.summary)}</div>` : ''}
            ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
          </div>`;
        group.appendChild(div);
      });
    });

    if (entries.length === LIMIT) {
      const wrap = document.createElement('div');
      wrap.className = 'load-more-wrap';
      wrap.innerHTML = `<button class="load-more" id="load-more-btn">Load more</button>`;
      main.appendChild(wrap);
      document.getElementById('load-more-btn').addEventListener('click', () => {
        offset += LIMIT;
        loadEntries(true);
      });
    }
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadEntries(append = false) {
    if (loading) return;
    loading = true;

    const btn = document.getElementById('load-more-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }

    const params = new URLSearchParams({ limit: LIMIT, offset });
    if (currentTopic) params.set('topic', currentTopic);
    if (currentSource) params.set('source', currentSource);

    try {
      const res = await fetch(API + '/api/entries?' + params);
      const entries = await res.json();
      renderEntries(entries, append);
    } catch (e) {
      console.error('Failed to load entries', e);
      if (!append) {
        document.getElementById('main').innerHTML = '<div class="empty">Failed to load entries. Is the server running?</div>';
      }
    } finally {
      loading = false;
    }
  }

  // Init
  loadTopics();
  loadEntries(false);
  loadChart();
</script>
</body>
</html>
