<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>info_digger — AI Intelligence Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --github: #3b82f6;
      --arxiv: #f97316;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .search-wrap {
      flex: 1;
      max-width: 400px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .controls label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .source-filters { display: flex; gap: 8px; }

    .source-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .source-btn.active-github { border-color: var(--github); color: var(--github); background: rgba(59,130,246,.1); }
    .source-btn.active-arxiv  { border-color: var(--arxiv);  color: var(--arxiv);  background: rgba(249,115,22,.1); }
    .source-btn.active-all    { border-color: var(--accent);  color: var(--accent); background: rgba(99,102,241,.1); }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .month-group { margin-bottom: 32px; }

    .month-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .entry {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .entry:last-child { border-bottom: none; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .dot-github { background: var(--github); }
    .dot-arxiv  { background: var(--arxiv); }

    .entry-body { flex: 1; min-width: 0; }

    .entry-title {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .entry-title a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      word-break: break-word;
    }

    .entry-title a:hover { color: var(--accent); }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-github { background: rgba(59,130,246,.15); color: var(--github); }
    .badge-arxiv  { background: rgba(249,115,22,.15); color: var(--arxiv); }

    .entry-summary {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(99,102,241,.1);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,.2);
    }

    .load-more-wrap { text-align: center; margin-top: 32px; }

    .load-more {
      padding: 10px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: border-color .15s;
    }

    .load-more:hover { border-color: var(--accent); color: var(--accent); }
    .load-more:disabled { opacity: .4; cursor: default; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 15px;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .stats-bar {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">info_digger <span>/ AI timeline</span></div>
  <div class="search-wrap">
    <input
      type="text"
      id="search-input"
      placeholder="Search... (coming soon)"
      readonly
      title="Research assistant coming in Phase 2"
    >
  </div>
</header>

<div class="controls">
  <div style="display:flex;align-items:center;gap:8px">
    <label>Topic</label>
    <select id="topic-select">
      <option value="">All topics</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <label>Source</label>
    <div class="source-filters">
      <button class="source-btn active-all" data-source="" id="btn-all">All</button>
      <button class="source-btn" data-source="github" id="btn-github">GitHub</button>
      <button class="source-btn" data-source="arxiv" id="btn-arxiv">arXiv</button>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading">Loading timeline...</div>
</main>

<script>
  const API = '';
  let currentTopic = '';
  let currentSource = '';
  let offset = 0;
  let loading = false;
  const LIMIT = 50;

  // Search box: show coming-soon
  document.getElementById('search-input').addEventListener('focus', function() {
    this.blur();
    alert('Research assistant coming in Phase 2 — ask questions like "what happened with RAG this month?"');
  });

  // Load topics
  async function loadTopics() {
    try {
      const res = await fetch(API + '/api/topics');
      const topics = await res.json();
      const sel = document.getElementById('topic-select');
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.error('Failed to load topics', e);
    }
  }

  // Source filter buttons
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.source-btn').forEach(b => {
        b.className = 'source-btn';
      });
      const src = btn.dataset.source;
      if (src === '') {
        btn.className = 'source-btn active-all';
      } else {
        btn.className = `source-btn active-${src}`;
      }
      currentSource = src;
      reset();
    });
  });

  document.getElementById('topic-select').addEventListener('change', function() {
    currentTopic = this.value;
    reset();
  });

  function reset() {
    offset = 0;
    document.getElementById('main').innerHTML = '<div class="loading">Loading...</div>';
    loadEntries(true);
  }

  // Group entries by YYYY-MM
  function monthKey(iso) {
    return iso ? iso.slice(0, 7) : 'unknown';
  }

  function monthLabel(key) {
    if (key === 'unknown') return 'Unknown';
    const [y, m] = key.split('-');
    return new Date(+y, +m - 1).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
  }

  function renderEntries(entries, append) {
    const main = document.getElementById('main');

    if (!append) {
      main.innerHTML = '';
      if (entries.length === 0) {
        main.innerHTML = '<div class="empty">No entries found. The crawler may still be running — check back in a few minutes.</div>';
        return;
      }
    }

    // Remove old load-more
    const oldBtn = document.getElementById('load-more-btn');
    if (oldBtn) oldBtn.parentElement.remove();

    // Group by month
    const groups = {};
    entries.forEach(e => {
      const k = monthKey(e.published_at);
      if (!groups[k]) groups[k] = [];
      groups[k].push(e);
    });

    Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0])).forEach(([key, items]) => {
      // Find or create month group
      let group = document.querySelector(`[data-month="${key}"]`);
      if (!group) {
        group = document.createElement('div');
        group.className = 'month-group';
        group.dataset.month = key;
        group.innerHTML = `<div class="month-label">${monthLabel(key)}</div>`;
        main.appendChild(group);
      }

      items.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        const tagsHtml = (entry.topic_tags || [])
          .map(t => `<span class="tag">${t}</span>`).join('');
        div.innerHTML = `
          <div class="dot dot-${entry.source}"></div>
          <div class="entry-body">
            <div class="entry-title">
              <a href="${entry.url}" target="_blank" rel="noopener">${escHtml(entry.title)}</a>
              <span class="badge badge-${entry.source}">${entry.source === 'github' ? 'GitHub' : 'arXiv'}</span>
            </div>
            ${entry.summary ? `<div class="entry-summary">${escHtml(entry.summary)}</div>` : ''}
            ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
          </div>`;
        group.appendChild(div);
      });
    });

    // Load more button
    if (entries.length === LIMIT) {
      const wrap = document.createElement('div');
      wrap.className = 'load-more-wrap';
      wrap.innerHTML = `<button class="load-more" id="load-more-btn">Load more</button>`;
      main.appendChild(wrap);
      document.getElementById('load-more-btn').addEventListener('click', () => {
        offset += LIMIT;
        loadEntries(true);
      });
    }
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadEntries(append = false) {
    if (loading) return;
    loading = true;

    const btn = document.getElementById('load-more-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }

    const params = new URLSearchParams({ limit: LIMIT, offset });
    if (currentTopic) params.set('topic', currentTopic);
    if (currentSource) params.set('source', currentSource);

    try {
      const res = await fetch(API + '/api/entries?' + params);
      const entries = await res.json();
      renderEntries(entries, append);
    } catch (e) {
      console.error('Failed to load entries', e);
      if (!append) {
        document.getElementById('main').innerHTML = '<div class="empty">Failed to load entries. Is the server running?</div>';
      }
    } finally {
      loading = false;
    }
  }

  // Init
  loadTopics();
  loadEntries(false);
</script>
</body>
</html>
